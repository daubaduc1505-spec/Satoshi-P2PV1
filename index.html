<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$P2P | THE SATOSHI PROTOCOL</title>
    <style>
        :root { --green: #39FF14; --bg: #050505; --panel: rgba(0, 25, 0, 0.85); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; position: relative; z-index: 10; }
        .panel { background: var(--panel); border: 2px solid var(--green); padding: 15px; box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); margin-bottom: 20px; }
        .timer-val { font-size: clamp(1.5rem, 4vw, 3.5rem); font-weight: 900; text-align: center; text-shadow: 0 0 15px var(--green); }
        .btc-reward-box { text-align: center; border: 2px solid #ff9900; padding: 15px; background: rgba(255, 153, 0, 0.05); }
        .btc-val-big { font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px #ff9900; }
        .stat-card span { font-size: 1.8rem; display: block; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--green); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        th { text-align: left; color: #888; border-bottom: 1px solid #113311; }
        td { padding: 8px 0; border-bottom: 1px solid #0a1a0a; }
        .live-feed { height: 250px; overflow: hidden; font-size: 0.8rem; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="main-grid">
        <div class="left-col">
            <div class="panel">
                <div id="main-timer" class="timer-val">05D:07H:22M:14S</div>
                <div style="text-align:center; color:#fff; font-weight:bold; margin-top:5px;">HAPPY BIRTHDAY SATOSHI</div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div class="panel" style="text-align:center;">MARKET CAP<span id="mc-val">$0.00</span></div>
                <div class="panel" style="text-align:center;">HOLDERS<span id="holder-count">0</span></div>
            </div>
            <div class="panel">
                <h3 style="margin:0; font-size:0.9rem;">TOP PROTOCOL HOLDERS</h3>
                <table>
                    <thead><tr><th>RANK</th><th>ADDRESS</th><th>QUANTITY</th></tr></thead>
                    <tbody id="holder-table"></tbody>
                </table>
            </div>
        </div>
        <div class="right-col">
            <div class="panel" style="border-color:#ff9900;">
                <h3 style="margin:0; text-align:center; color:#ff9900;">⚡ SATOSHI REWARDS</h3>
                <div class="btc-reward-box">
                    <small style="color:#ff9900;">ACCUMULATED</small>
                    <div id="accumulated-btc" class="btc-val-big">0.000000 BTC</div>
                </div>
                <div style="margin-top:10px; text-align:center; font-size:0.8rem;">
                    TOTAL DISTRIBUTED: <b id="total-distributed-btc">1.258 BTC</b>
                </div>
            </div>
            <div class="panel">
                <h3 style="margin:0; font-size:0.9rem;">LIVE NETWORK ACTIVITY</h3>
                <div class="live-feed" id="trade-feed"></div>
            </div>
        </div>
    </div>

    <script>
        // Hiệu ứng Matrix
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function drawMatrix() { ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#39FF14"; ctx.font = "16px monospace"; drops.forEach((y,i) => { ctx.fillText("01$P2P"[Math.floor(Math.random()*6)], i*16, y*16); if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        setInterval(drawMatrix, 35);

        // KẾT NỐI API THỰC
        async function updateData() {
            try {
                const res = await fetch('http://127.0.0.1:5000/api/stats');
                const data = await res.json();
                
                document.getElementById('mc-val').innerText = data.market_cap;
                document.getElementById('holder-count').innerText = data.holders;
                document.getElementById('accumulated-btc').innerText = data.btc_rewards.accumulated + " BTC";
                document.getElementById('total-distributed-btc').innerText = data.btc_rewards.distributed + " BTC";

                // Danh sách ví Holders
                if(data.top_holders && data.top_holders.length > 0) {
                    document.getElementById('holder-table').innerHTML = data.top_holders.map((h, i) => 
                        `<tr><td>0${i+1}</td><td>${h.address.slice(0,6)}...${h.address.slice(-4)}</td><td>${h.amount.toLocaleString()}</td></tr>`
                    ).join('');
                }

                // Nhật ký giao dịch
                document.getElementById('trade-feed').innerHTML = data.recent_trades.map(t => 
                    `<div style="color:${t.type==='BUY'?'#39FF14':'#ff3131'}">[${t.time}] ${t.type} ${t.sol} SOL</div>`
                ).join('');
            } catch(e) { console.error("Reconnecting to $P2P Bridge..."); }
        }
        setInterval(updateData, 5000);
        updateData();
    </script>
</body>
</html>
